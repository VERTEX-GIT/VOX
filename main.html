<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VOX - AI Sign Language Platform</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; color: white; }
    #ui { position: absolute; top: 20px; left: 20px; z-index: 10; }
    #video-container { position: absolute; bottom: 20px; left: 20px; width: 320px; height: 240px; border: 2px solid #00ff88; border-radius: 10px; overflow: hidden; }
    #webcam { width: 100%; height: 100%; transform: rotateY(180deg); }
    #guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; text-align: center; pointer-events: none; }
    canvas.output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); }
  </style>
</head>
<body>

  <div id="ui">
    <h1>VOX Project</h1>
    <p>Status: <span id="status">Loading AI...</span></p>
    <div id="result" style="font-size: 1.5rem; color: #00ff88;">Gesture: None</div>
  </div>

  <div id="guide">따라하세요: "주먹 가위 보"</div>

  <div id="video-container">
    <video id="webcam" autoplay></video>
    <canvas class="output_canvas" id="output_canvas"></canvas>
  </div>

  <div id="container3d"></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script type="module">
    // --- [A & C 담당: MediaPipe 설정] ---
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status');
    const resultText = document.getElementById('result');

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      
      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 5});
          drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
          
          // 단순 로직: 검지 손가락 끝(8번)이 손바닥(0번)보다 훨씬 위에 있으면 '펴짐'으로 간주
          // 건형(C)과 건우(A)가 여기서 수어 분류 로직을 발전시키면 됨
          analyzeGesture(landmarks);
        }
      }
      canvasCtx.restore();
    }

    function analyzeGesture(points) {
      // 예시: 아주 간단한 검지 판별 (실제 수어 로직으로 대체 필요)
      const indexTip = points[8].y;
      const wrist = points[0].y;
      if (indexTip < wrist - 0.2) {
        resultText.innerText = "Gesture: Pointing Up!";
      } else {
        resultText.innerText = "Gesture: Waiting...";
      }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
        statusText.innerText = "Running";
      },
      width: 640,
      height: 480
    });
    camera.start();

    // --- [B 담당: Three.js 3D 캐릭터 설정] ---
    const scene = new THREE.Scene();
    const camera3d = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container3d').appendChild(renderer.domElement);

    // 캐릭터 대신 일단 '박스'를 띄움 (나중에 정훈이가 .glb 캐릭터로 교체)
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);
    camera3d.position.z = 5;

    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.01; // 나중에 정훈이가 이 회전값을 손가락 데이터와 연동
      cube.rotation.y += 0.01;
      renderer.render(scene, camera3d);
    }
    animate();

    // 창 크기 조절 대응
    window.addEventListener('resize', () => {
      camera3d.aspect = window.innerWidth / window.innerHeight;
      camera3d.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
